name: Save coordinate override

on:
  workflow_dispatch:
    inputs:
      station_result_id:
        description: Station result id
        required: true
        type: string
      latitude:
        description: Latitude
        required: true
        type: string
      longitude:
        description: Longitude
        required: true
        type: string
      center_name_bn:
        description: Centre name (optional)
        required: false
        type: string
      constituency_no:
        description: Constituency number (optional)
        required: false
        type: string
      constituency_name_bn:
        description: Constituency name (optional)
        required: false
        type: string

permissions:
  contents: write

jobs:
  save-coordinate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upsert override and trim unresolved feed
        env:
          STATION_RESULT_ID: ${{ github.event.inputs.station_result_id }}
          LATITUDE: ${{ github.event.inputs.latitude }}
          LONGITUDE: ${{ github.event.inputs.longitude }}
          CENTER_NAME_BN: ${{ github.event.inputs.center_name_bn }}
          CONSTITUENCY_NO: ${{ github.event.inputs.constituency_no }}
          CONSTITUENCY_NAME_BN: ${{ github.event.inputs.constituency_name_bn }}
        run: |
          python - <<'PY'
          import csv
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          sid = os.environ["STATION_RESULT_ID"].strip()
          lat = float(os.environ["LATITUDE"].strip())
          lon = float(os.environ["LONGITUDE"].strip())
          root = Path(".")
          overrides_path = root / "data/review/coordinate_manual_overrides.csv"
          unresolved_path = root / "data/review/unresolved_stations.json"

          if not (20.0 <= lat <= 27.5 and 87.0 <= lon <= 93.5):
              raise SystemExit("Coordinates are outside expected Bangladesh bounds.")

          with unresolved_path.open(encoding="utf-8") as f:
              unresolved = json.load(f)

          target = None
          for row in unresolved:
              if str(row.get("station_result_id")) == sid:
                  target = row
                  break

          if target is None:
              target = {
                  "station_result_id": sid,
                  "center_name_bn": os.environ.get("CENTER_NAME_BN", ""),
                  "constituency_no": os.environ.get("CONSTITUENCY_NO", ""),
                  "constituency_name_bn": os.environ.get("CONSTITUENCY_NAME_BN", ""),
              }

          overrides_path.parent.mkdir(parents=True, exist_ok=True)
          fieldnames = [
              "saved_at_utc",
              "station_result_id",
              "center_id",
              "center_serial",
              "constituency_no",
              "constituency_name_bn",
              "district_name_bn",
              "upazilla_name_bn",
              "union_name_bn",
              "municipality_name_bn",
              "union_ward_name_bn",
              "center_name_bn",
              "latitude",
              "longitude",
              "source",
          ]
          rows = []
          if overrides_path.exists():
              with overrides_path.open(newline="", encoding="utf-8-sig") as f:
                  rows = list(csv.DictReader(f))

          override = {
              "saved_at_utc": datetime.now(timezone.utc).isoformat(),
              "station_result_id": sid,
              "center_id": target.get("center_id", ""),
              "center_serial": target.get("center_serial", ""),
              "constituency_no": target.get("constituency_no", os.environ.get("CONSTITUENCY_NO", "")),
              "constituency_name_bn": target.get("constituency_name_bn", os.environ.get("CONSTITUENCY_NAME_BN", "")),
              "district_name_bn": target.get("district_name_bn", ""),
              "upazilla_name_bn": target.get("upazilla_name_bn", ""),
              "union_name_bn": target.get("union_name_bn", ""),
              "municipality_name_bn": target.get("municipality_name_bn", ""),
              "union_ward_name_bn": target.get("union_ward_name_bn", ""),
              "center_name_bn": target.get("center_name_bn", os.environ.get("CENTER_NAME_BN", "")),
              "latitude": f"{lat:.8f}",
              "longitude": f"{lon:.8f}",
              "source": "github_action_review",
          }

          replaced = False
          for index, row in enumerate(rows):
              if row.get("station_result_id") == sid:
                  rows[index] = override
                  replaced = True
                  break
          if not replaced:
              rows.append(override)

          with overrides_path.open("w", newline="", encoding="utf-8-sig") as f:
              writer = csv.DictWriter(f, fieldnames=fieldnames)
              writer.writeheader()
              writer.writerows(rows)

          unresolved = [row for row in unresolved if str(row.get("station_result_id")) != sid]
          with unresolved_path.open("w", encoding="utf-8") as f:
              json.dump(unresolved, f, ensure_ascii=False, indent=2)
              f.write("\n")
          PY

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/review/coordinate_manual_overrides.csv data/review/unresolved_stations.json
          git diff --cached --quiet && exit 0
          git commit -m "Save coordinate override for ${{ github.event.inputs.station_result_id }}"
          git push
